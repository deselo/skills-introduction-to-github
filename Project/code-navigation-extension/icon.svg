<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="128" height="128" rx="16" fill="url(#grad1)"/>
  
  <!-- Code symbol -->
  <g transform="translate(24, 24)">
    <!-- Left bracket -->
    <path d="M10 20 L10 40 L20 50 L10 60 L10 80" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right bracket -->
    <path d="M70 20 L70 40 L60 50 L70 60 L70 80" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Arrow pointing right -->
    <path d="M25 50 L55 50 M45 40 L55 50 L45 60" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Navigation arrow -->
    <path d="M40 30 L40 70 M30 60 L40 70 L50 60" stroke="#FFD700" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Small dots for decoration -->
  <circle cx="100" cy="30" r="4" fill="white" opacity="0.6"/>
  <circle cx="110" cy="40" r="3" fill="white" opacity="0.4"/>
  <circle cx="95" cy="50" r="2" fill="white" opacity="0.3"/>
</svg>